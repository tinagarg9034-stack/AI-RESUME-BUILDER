<!DOCTYPE html>
<html>
<head>
    <title>Contact Messages</title>
</head>
<body>

<h2>All Contact Messages</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Action</th>
    </tr>

    {% for message in messages %}
    <tr>
        <td>{{ message.name }}</td>
        <td>{{ message.email }}</td>
        <td>{{ message.message }}</td>
        <td>
            <a href="/delete-message/{{ message.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
