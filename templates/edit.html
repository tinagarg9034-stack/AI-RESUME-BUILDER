<!DOCTYPE html>
<html>
<head>
    <title>Edit Resume</title>
</head>
<body>
{% include "navbar.html" %}
<h2>Edit Resume</h2>

<form action="/update" method="POST">

    <input type="text" name="name" value="{{ resume.name }}" placeholder="Name"><br><br>

    <input type="email" name="email" value="{{ resume.email }}" readonly><br><br>

    <input type="text" name="phone" value="{{ resume.phone }}" placeholder="Phone"><br><br>

    <textarea name="skills" placeholder="Skills">{{ resume.skills }}</textarea><br><br>

    <textarea name="education" placeholder="Education">{{ resume.education }}</textarea><br><br>

    <textarea name="experience" placeholder="Experience">{{ resume.experience }}</textarea><br><br>

    <button type="submit">Update Resume</button>

</form>

</body>
</html>
